<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地视频播放器</title>
    <style>
        /* 简洁美观的深色风格 */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .player-container {
            background: #2d2d2d;
            border-radius: 16px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 25px;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .upload-area {
            border: 2px dashed #555;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .upload-area:hover {
            border-color: #888;
            background: #383838;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-area label {
            cursor: pointer;
            font-size: 1.1rem;
        }
        .upload-area small {
            display: block;
            margin-top: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            display: block;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
        }
        .controls button {
            background: #444;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .controls button:hover {
            background: #5a5a5a;
            transform: scale(1.02);
        }
        .controls button.primary {
            background: #007aff;
        }
        .controls button.primary:hover {
            background: #0066d9;
        }
        .controls input[type="range"] {
            flex: 1;
            min-width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #555;
            border-radius: 2px;
            outline: none;
        }
        .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #007aff;
            cursor: pointer;
        }
        .time-display {
            font-size: 0.95rem;
            color: #ccc;
            min-width: 110px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .file-info {
            margin-top: 15px;
            padding: 12px 16px;
            background: #222;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #aaa;
            word-break: break-all;
        }
        .file-info strong {
            color: #ddd;
        }
        @media (max-width: 600px) {
            .player-container { padding: 20px; }
            .controls button { padding: 6px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="player-container">
    <h1>🎬 本地视频播放器</h1>

    <!-- 文件上传区域 -->
    <div class="upload-area" id="uploadArea">
        <label for="videoInput">
            📁 点击选择本地视频文件
            <small>支持 MP4, WebM, AVI, MOV 等常见格式</small>
        </label>
        <input type="file" id="videoInput" accept="video/*">
    </div>

    <!-- 视频播放器 -->
    <video id="videoPlayer" controlslist="nodownload" preload="metadata"></video>

    <!-- 自定义控制栏 -->
    <div class="controls">
        <button id="playBtn" class="primary">▶ 播放</button>
        <button id="muteBtn">🔊 静音</button>
        <input type="range" id="progressBar" value="0" step="0.001">
        <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
        <button id="fullscreenBtn">⛶ 全屏</button>
    </div>

    <!-- 当前文件信息 -->
    <div class="file-info" id="fileInfo">
        <strong>未加载视频</strong>
    </div>
</div>

<script>
    (function(){
        // DOM 元素引用
        const video = document.getElementById('videoPlayer');
        const fileInput = document.getElementById('videoInput');
        const uploadArea = document.getElementById('uploadArea');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fileInfo = document.getElementById('fileInfo');

        // 状态变量
        let isDragging = false; // 用于进度条拖动

        // --- 1. 加载本地视频 ---
        function loadVideo(file) {
            if (!file || !file.type.startsWith('video/')) {
                alert('请选择一个有效的视频文件。');
                return;
            }

            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();

            // 显示文件信息
            const size = (file.size / (1024 * 1024)).toFixed(2);
            fileInfo.innerHTML = `
                <strong>📄 文件名：</strong> ${file.name} &nbsp;|&nbsp; 
                <strong>📦 大小：</strong> ${size} MB &nbsp;|&nbsp; 
                <strong>📹 类型：</strong> ${file.type || '未知'}
            `;

            // 自动播放（可选）
            video.play().catch(() => {});
        }

        // 文件选择事件
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                loadVideo(this.files[0]);
            }
            // 重置input，允许重复选择同一个文件
            this.value = '';
        });

        // 拖拽上传支持
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = '#007aff';
            this.style.background = '#383838';
        });
        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = '#555';
            this.style.background = 'transparent';
        });
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = '#555';
            this.style.background = 'transparent';
            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                // 只取第一个视频文件
                const videoFile = Array.from(files).find(f => f.type.startsWith('video/'));
                if (videoFile) {
                    loadVideo(videoFile);
                } else {
                    alert('请拖拽视频文件。');
                }
            }
        });
        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', function(e) {
            if (e.target.tagName !== 'LABEL' && e.target.tagName !== 'INPUT') {
                fileInput.click();
            }
        });

        // --- 2. 播放/暂停 ---
        function togglePlay() {
            if (video.paused || video.ended) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        }

        playBtn.addEventListener('click', togglePlay);

        video.addEventListener('play', function() {
            playBtn.textContent = '⏸ 暂停';
        });
        video.addEventListener('pause', function() {
            playBtn.textContent = '▶ 播放';
        });
        video.addEventListener('ended', function() {
            playBtn.textContent = '▶ 播放';
            progressBar.value = 0;
            // 重置时间显示
            updateTimeDisplay(0, video.duration || 0);
        });

        // --- 3. 静音切换 ---
        muteBtn.addEventListener('click', function() {
            video.muted = !video.muted;
            this.textContent = video.muted ? '🔇 取消静音' : '🔊 静音';
        });

        // --- 4. 进度条控制 ---
        function updateTimeDisplay(current, total) {
            if (!total || isNaN(total)) total = 0;
            const formatTime = (seconds) => {
                if (!seconds || isNaN(seconds)) return '00:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };
            timeDisplay.textContent = `${formatTime(current)} / ${formatTime(total)}`;
        }

        // 视频加载后更新进度条范围
        video.addEventListener('loadedmetadata', function() {
            progressBar.max = video.duration || 0;
            updateTimeDisplay(0, video.duration);
        });

        // 视频播放时更新进度条
        video.addEventListener('timeupdate', function() {
            if (!isDragging) {
                progressBar.value = video.currentTime || 0;
                updateTimeDisplay(video.currentTime, video.duration);
            }
        });

        // 用户开始拖动进度条
        progressBar.addEventListener('pointerdown', function() {
            isDragging = true;
        });

        // 用户拖动进度条
        progressBar.addEventListener('input', function() {
            const time = parseFloat(this.value);
            if (!isNaN(time) && video.duration) {
                updateTimeDisplay(time, video.duration);
            }
        });

        // 用户结束拖动
        progressBar.addEventListener('pointerup', function() {
            isDragging = false;
            const time = parseFloat(this.value);
            if (!isNaN(time)) {
                video.currentTime = time;
            }
        });

        // 防止鼠标松开在控件外导致拖拽锁定
        document.addEventListener('pointerup', function() {
            if (isDragging) {
                isDragging = false;
                const time = parseFloat(progressBar.value);
                if (!isNaN(time)) {
                    video.currentTime = time;
                }
            }
        });

        // --- 5. 全屏 ---
        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        });

        // --- 6. 键盘快捷键（空格切换播放） ---
        document.addEventListener('keydown', function(e) {
            if (e.target === document.body && e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // --- 7. 清理资源（可选） ---
        window.addEventListener('beforeunload', function() {
            if (video.src) {
                URL.revokeObjectURL(video.src);
            }
        });

        // 初始化显示
        updateTimeDisplay(0, 0);
    })();
</script>
</body>
  </html>
